name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; let in-progress runs finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        id: install
        run: npm ci
        continue-on-error: true

      - name: Report install failure
        if: steps.install.outcome == 'failure'
        run: |
          echo "Re-running npm ci verbosely to capture the real error as annotations:"
          npm ci --loglevel verbose > npm-install-verbose.log 2>&1 || true
          tail -n 60 npm-install-verbose.log | while IFS= read -r line; do
            echo "::error::${line}"
          done
          exit 1

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        run: npm run build

      - name: Ensure .nojekyll (prevents Jekyll from dropping _next/)
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
